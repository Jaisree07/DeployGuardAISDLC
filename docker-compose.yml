services:

  deployguard-api:
    build: .

    container_name: deployguard-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - prometheus
      - pushgateway

    restart: unless-stopped

    networks:
      - deployguard-network

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: unless-stopped

    networks:
      - deployguard-network

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana-storage:/var/lib/grafana

    restart: unless-stopped

    networks:
      - deployguard-network

  pushgateway:
    image: prom/pushgateway

    container_name: pushgateway

    ports:
      - "9091:9091"

    restart: unless-stopped

    networks:
      - deployguard-network

volumes:
  grafana-storage:

networks:
  deployguard-network:
    driver: bridge